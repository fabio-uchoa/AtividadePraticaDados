resources:
  jobs:
    AtividadePratica_VDEV:
      name: AtividadePratica VDEV
      schedule:
        quartz_cron_expression: 23 0 13 * * ?
        timezone_id: America/Recife
        pause_status: UNPAUSED
      tasks:
        - task_key: land_to_bronze
          notebook_task:
            notebook_path: /Workspace/Atividade/Atividade_land_to_bronze
            source: WORKSPACE
          environment_key: Default
        - task_key: bronze_to_silver
          depends_on:
            - task_key: land_to_bronze
          notebook_task:
            notebook_path: /Workspace/Atividade/Atividade_bronze_to_silver
            source: WORKSPACE
          environment_key: Default
        - task_key: silver_to_gold
          depends_on:
            - task_key: bronze_to_silver
          notebook_task:
            notebook_path: /Workspace/Atividade/Atividade_silver_to_gold
            source: WORKSPACE
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
